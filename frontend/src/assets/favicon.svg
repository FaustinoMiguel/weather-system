<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="sky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="sun" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- Fundo azul arredondado -->
  <rect width="32" height="32" rx="7" fill="url(#sky)"/>
  <!-- Raios do sol -->
  <g transform="translate(12,13)" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <line x1="0" y1="-7" x2="0" y2="-5"/>
    <line x1="4.95" y1="-4.95" x2="3.54" y2="-3.54"/>
    <line x1="7" y1="0" x2="5" y2="0"/>
    <line x1="4.95" y1="4.95" x2="3.54" y2="3.54"/>
    <line x1="0" y1="7" x2="0" y2="5"/>
    <line x1="-4.95" y1="4.95" x2="-3.54" y2="3.54"/>
    <line x1="-7" y1="0" x2="-5" y2="0"/>
    <line x1="-4.95" y1="-4.95" x2="-3.54" y2="-3.54"/>
  </g>
  <!-- Círculo do sol -->
  <circle cx="12" cy="13" r="4" fill="url(#sun)"/>
  <!-- Nuvem -->
  <ellipse cx="21" cy="18" rx="5" ry="3.5" fill="white" opacity="0.95"/>
  <ellipse cx="17.5" cy="19.5" rx="3.5" ry="2.5" fill="white" opacity="0.95"/>
  <ellipse cx="23.5" cy="19.5" rx="3" ry="2.2" fill="white" opacity="0.95"/>
</svg>
